services:
  backend:
    build:
      context: ./backend
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      DATABASE_URL: postgresql://weather:weather@db:5432/weather_db
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend

volumes:
  postgres_data: